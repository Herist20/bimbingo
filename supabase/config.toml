# Konfigurasi Supabase CLI untuk Bimbingo.
# Generate via `pnpm supabase init`, kemudian sesuaikan.

project_id = "bimbingo"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1s"

[auth.email.template.confirmation]
subject = "Konfirmasi akun Bimbingo Anda"

[auth.email.template.recovery]
subject = "Atur ulang password Bimbingo"

[auth.email.template.magic_link]
subject = "Magic link Bimbingo Anda"

[edge_runtime]
enabled = true
